<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="animation: fadeIn 0.8s ease-in-out;" width="495" height="195">
  <style>
    @keyframes fadeIn {
      0%  { opacity: 0; }
      100%{ opacity: 1; }
    }
    @keyframes currStreak {
      0%  { font-size: 3px; }
      80% { font-size: 34px; }
      100%{ font-size: 28px; }
    }
    .text-base    { fill: #c9d1d9; }
    .text-accent  { fill: #a78bfa; }
    .text-date    { fill: #8b949e; font-size: 11px; }
    .streak-num   { animation: currStreak 0.6s linear forwards; transform-origin: center; }
  </style>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="494" height="194" rx="4.5" fill="#0d1117" stroke="#e4e2e2" stroke-opacity="0"/>

  <!-- Divider lines -->
  <line x1="165" y1="28" x2="165" y2="170" stroke="#8b949e" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="330" y1="28" x2="330" y2="170" stroke="#8b949e" stroke-opacity="0.3" stroke-width="1"/>

  <!-- ─── LEFT: Total Contributions ─── -->
  <g transform="translate(82.5, 97.5)">
    <!-- Number -->
    <text x="0" y="-22" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="28" font-weight="700" class="text-accent">464</text>
    <!-- Label -->
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="14" font-weight="400" class="text-base">Total Contributions</text>
    <!-- Date range -->
    <text x="0" y="25" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" class="text-date">Feb 1 – Mar 26, 2026</text>
  </g>

  <!-- ─── CENTER: Current Streak ─── -->
  <g transform="translate(247.5, 97.5)">
    <!-- Fire icon -->
    <text x="0" y="-52" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="20">🔥</text>
    <!-- Number (animated) -->
    <text x="0" y="-22" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="28" font-weight="700" class="text-accent streak-num">53</text>
    <!-- Label -->
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="14" font-weight="400" class="text-base">Current Streak</text>
    <!-- Date range -->
    <text x="0" y="25" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" class="text-date">Mar 6, 2026 – Present</text>
  </g>

  <!-- ─── RIGHT: Longest Streak ─── -->
  <g transform="translate(412.5, 97.5)">
    <!-- Number -->
    <text x="0" y="-22" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="28" font-weight="700" class="text-accent">53</text>
    <!-- Label -->
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="14" font-weight="400" class="text-base">Longest Streak</text>
    <!-- Date range -->
    <text x="0" y="25" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Sans-Serif" class="text-date">Mar 6, 2026 – Present</text>
  </g>
</svg>
