<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a78bfa; animation: fadeInAnimation 0.8s ease-in-out forwards; }
    .stat  { font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #c9d1d9; }
    .stagger { opacity: 0; animation: fadeInAnimation 0.3s ease-in-out forwards; }
    .rank-text { font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a78bfa; }
    .rank-percentile-text { font: 800 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a78bfa; }
    .bold { font-weight: 700; fill: #c9d1d9; }
    .icon { fill: #a78bfa; }
    @keyframes fadeInAnimation {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleInAnimation {
      from { transform: translate(-5px, 5px) scale(0); }
      to   { transform: translate(-5px, 5px) scale(1); }
    }
    @keyframes rankAnimation {
      from { stroke-dashoffset: 251.32741228718345; opacity: 1; }
      to   { stroke-dashoffset: 75; opacity: 1; }
    }
  </style>
  <rect data-testid="card-bg" x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4e2e2" width="494" fill="#0d1117" stroke-opacity="0"/>
  <g data-testid="card-title" transform="translate(25, 35)">
    <g transform="translate(0, 0)">
      <text x="0" y="0" class="header" data-testid="header">calmcode47&apos;s GitHub Stats</text>
    </g>
  </g>
  <g data-testid="main-card-body" transform="translate(0, 55)">
    <g data-testid="rank-circle" transform="translate(390, 55)">
      <circle r="40" cx="0" cy="0" fill="none" stroke="#e4e2e2" stroke-width="6" stroke-opacity="0.2"/>
      <circle data-testid="rank-circle-stroke" r="40" cx="0" cy="0" fill="none" stroke="#a78bfa" stroke-dasharray="251.32741228718345" stroke-dashoffset="75" stroke-linecap="round" stroke-width="6" style="transform: rotate(-90deg); animation: rankAnimation 1s forwards ease-in-out;"/>
      <g>
        <text x="0" y="0" alignment-baseline="central" dominant-baseline="central" text-anchor="middle" data-testid="level-rank-icon" class="rank-text">A+</text>
      </g>
    </g>
    <svg x="0" y="0">
      <g transform="translate(0, 0)">
        <g class="stagger" style="animation-delay: 450ms" transform="translate(25, 20)">
          <svg data-testid="icon" class="icon" viewBox="0 0 16 16" version="1.1" width="16" height="16">
            <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
          </svg>
          <text class="stat bold" x="25" y="12.5">Total Stars Earned:</text>
          <text class="stat" x="230" y="12.5" data-testid="stars">12</text>
        </g>
        <g class="stagger" style="animation-delay: 600ms" transform="translate(25, 50)">
          <svg data-testid="icon" class="icon" viewBox="0 0 16 16" version="1.1" width="16" height="16">
            <path d="M1.643 3.143 1.643 3.143 1.643 3.143c0-1.235 1.008-2.25 2.25-2.25h6.964c1.242 0 2.25 1.015 2.25 2.25v6.964c0 1.242-1.008 2.25-2.25 2.25H3.893c-1.242 0-2.25-1.008-2.25-2.25V3.143ZM3.464 0C1.55 0 0 1.55 0 3.464V10.5c0 1.914 1.55 3.464 3.464 3.464H10.5c1.914 0 3.464-1.55 3.464-3.464V3.464C13.964 1.55 12.414 0 10.5 0H3.464Z"/>
            <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393Z"/>
          </svg>
          <text class="stat bold" x="25" y="12.5">Total Commits (2026):</text>
          <text class="stat" x="230" y="12.5" data-testid="commits">464</text>
        </g>
        <g class="stagger" style="animation-delay: 750ms" transform="translate(25, 80)">
          <svg data-testid="icon" class="icon" viewBox="0 0 16 16" version="1.1" width="16" height="16">
            <path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354Z"/>
          </svg>
          <text class="stat bold" x="25" y="12.5">Total PRs:</text>
          <text class="stat" x="230" y="12.5" data-testid="prs">8</text>
        </g>
        <g class="stagger" style="animation-delay: 900ms" transform="translate(25, 110)">
          <svg data-testid="icon" class="icon" viewBox="0 0 16 16" version="1.1" width="16" height="16">
            <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
            <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/>
          </svg>
          <text class="stat bold" x="25" y="12.5">Total Issues:</text>
          <text class="stat" x="230" y="12.5" data-testid="issues">3</text>
        </g>
        <g class="stagger" style="animation-delay: 1050ms" transform="translate(25, 140)">
          <svg data-testid="icon" class="icon" viewBox="0 0 16 16" version="1.1" width="16" height="16">
            <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/>
          </svg>
          <text class="stat bold" x="25" y="12.5">Contributed to (last year):</text>
          <text class="stat" x="230" y="12.5" data-testid="contribs">4</text>
